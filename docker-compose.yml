services:
  kratos-api:
    build:
      context: ./kratos-api
      dockerfile: src/Kratos.Api/Dockerfile
    container_name: kratos_api
    ports:
      - "5000:8080"
    environment:
      - RABBIT_URL=amqp://guest:guest@rabbitmq:5672
      - MONGO_URL=mongodb://root:example@mongodb:27017
    depends_on:
      rabbitmq:
        condition: service_healthy
    networks:
      - kratos-net

  kratos-worker:
    build: ./kratos-worker
    container_name: kratos_worker
    restart: always
    depends_on:
      rabbitmq:
        condition: service_healthy
      mongodb:
        condition: service_started
      redis:
        condition: service_started
    environment:
      - MONGO_URL=mongodb://root:example@mongodb:27017
      - REDIS_URL=redis:6379
      - RABBIT_URL=amqp://guest:guest@rabbitmq:5672
    networks:
      - kratos-net

  kratos-front:
    build: ./kratos-front
    container_name: kratos_front
    ports:
      - "3000:80"
    depends_on:
      - kratos-api
    networks:
      - kratos-net

  rabbitmq:
    image: rabbitmq:3-management
    container_name: kratos_rabbit
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - kratos-net

  mongodb:
    image: mongo:latest
    container_name: kratos_mongo
    environment:
      - MONGO_INITDB_ROOT_USERNAME=root
      - MONGO_INITDB_ROOT_PASSWORD=example
    ports:
      - "27017:27017"
    networks:
      - kratos-net

  redis:
    image: redis:alpine
    container_name: kratos_redis
    ports:
      - "6379:6379"
    networks:
      - kratos-net

networks:
  kratos-net:
    driver: bridge